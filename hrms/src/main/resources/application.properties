spring.application.name=hrms

# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/talentx?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# HIKARI CONNECTION POOL (OPTIMIZED)
# ===============================
spring.datasource.hikari.pool-name=HikariPool-HRMS
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.connection-timeout=20000

# ===============================
# JPA / HIBERNATE OPTIMIZATION
# ===============================
spring.jpa.hibernate.ddl-auto=validate
# open-in-view=true allows lazy loading during JSON serialization (prevents LazyInitializationException)
# This is acceptable for a REST API where we control the transaction boundaries
spring.jpa.open-in-view=true

# Disable unnecessary overhead in production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false

# Batch processing (performance boost)
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===============================
# LOGGING (CONTROLLED)
# ===============================
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=ERROR
logging.level.com.talentx.hrms=DEBUG

# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8080
server.servlet.context-path=/api

# ===============================
# JWT CONFIGURATION
# ===============================
jwt.secret=TalentX@HRMS#2026$SecureKey!ProductionReady@JWT&Token
jwt.expiration=86400000

# ===============================
# VALIDATION
# ===============================
spring.jpa.properties.hibernate.validator.apply_to_ddl=false